name: Release OpenClaw npm Package

# Version is determined automatically from npm registry.
# Default: patch bump from latest published version.
# Override: provide an explicit version string (e.g. 0.5.0, 1.0.0).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to publish (e.g. 0.5.0). Leave empty for auto patch bump.'
        required: false
        type: string

jobs:
  test:
    name: Test OpenClaw Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/openclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: rm -f package-lock.json && npm install
      - run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/openclaw
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Determine next version
        id: version
        run: |
          EXPLICIT="${{ inputs.version }}"
          if [ -n "$EXPLICIT" ]; then
            echo "next=$EXPLICIT" >> "$GITHUB_OUTPUT"
            echo "Using explicit version: $EXPLICIT"
          else
            CURRENT=$(npm view @matrixorigin/thememoria version 2>/dev/null || echo "0.0.0")
            echo "Current npm version: $CURRENT"
            # Bump patch: 0.4.3 -> 0.4.4
            NEXT=$(node -e "const [ma,mi,pa] = '${CURRENT}'.split('.').map(Number); console.log(ma+'.'+mi+'.'+(pa+1))")
            echo "next=$NEXT" >> "$GITHUB_OUTPUT"
            echo "Auto patch bump: $CURRENT -> $NEXT"
          fi

      - name: Set version in package.json
        run: npm version ${{ steps.version.outputs.next }} --no-git-tag-version

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: echo "### Published @matrixorigin/thememoria@${{ steps.version.outputs.next }} ✅" >> "$GITHUB_STEP_SUMMARY"
