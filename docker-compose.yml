# Memoria — All-in-One
#
# Usage:
#   docker compose up -d

services:

  matrixone-init:
    image: ${MATRIXONE_IMAGE:-matrixorigin/matrixone:latest}
    user: root
    entrypoint: ["sh", "-c", "chown -R 1000:1000 /mo-data"]
    volumes:
      - ${MATRIXONE_DATA_DIR:-./data/matrixone}:/mo-data
    networks:
      - memoria-net

  matrixone:
    image: ${MATRIXONE_IMAGE:-matrixorigin/matrixone:latest}
    hostname: matrixone
    user: "1000:1000"
    depends_on:
      matrixone-init:
        condition: service_completed_successfully
    ports:
      - "${MATRIXONE_PORT:-6001}:6001"
      - "${MATRIXONE_DEBUG_PORT:-}:6060"
    volumes:
      - ${MATRIXONE_DATA_DIR:-./data/matrixone}:/mo-data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - memoria-net
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'echo > /dev/tcp/127.0.0.1/6001' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: memoria_rs/Dockerfile
    hostname: memoria-api
    ports:
      - "${API_PORT:-8100}:8100"
    environment:
      - DATABASE_URL=mysql://root:${MEMORIA_DB_PASSWORD:-111}@matrixone:6001/${MEMORIA_DB_NAME:-memoria}
      - MASTER_KEY=${MEMORIA_MASTER_KEY:?Set MEMORIA_MASTER_KEY in .env (min 16 chars)}
      - EMBEDDING_PROVIDER=${MEMORIA_EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${MEMORIA_EMBEDDING_MODEL:-BAAI/bge-m3}
      - EMBEDDING_DIM=${MEMORIA_EMBEDDING_DIM:-1024}
      - EMBEDDING_API_KEY=${MEMORIA_EMBEDDING_API_KEY:-}
      - EMBEDDING_BASE_URL=${MEMORIA_EMBEDDING_BASE_URL:-}
      - LLM_API_KEY=${MEMORIA_LLM_API_KEY:-}
      - LLM_BASE_URL=${MEMORIA_LLM_BASE_URL:-}
      - LLM_MODEL=${MEMORIA_LLM_MODEL:-gpt-4o-mini}
    depends_on:
      matrixone:
        condition: service_healthy
    networks:
      - memoria-net
    restart: unless-stopped

volumes: {}

networks:
  memoria-net:
    driver: bridge
